configuration:
  brand:
    name: Brand
    description: Select whether the connector should use MyCupra or MySeat.
  username:
    name: Username
    description: Seat or Cupra account username.
  password:
    name: Password
    description: Seat or Cupra account password.
  spin:
    name: S-PIN
    description: Optional S-PIN for writable vehicle actions.
  mqtt_broker:
    name: MQTT broker
    description: Hostname or IP address of the MQTT broker.
  mqtt_port:
    name: MQTT port
    description: Port used to connect to the MQTT broker.
  mqtt_username:
    name: MQTT username
    description: Optional MQTT username.
  mqtt_password:
    name: MQTT password
    description: Optional MQTT password.
  mqtt_prefix:
    name: MQTT prefix
    description: Prefix used for all MQTT topics.
  update_interval:
    name: Update interval
    description: Poll interval in seconds. Upstream requires at least 300 seconds.
  mqtt_keepalive:
    name: MQTT keepalive
    description: MQTT keepalive in seconds.
  mqtt_version:
    name: MQTT version
    description: MQTT protocol version.
  transport:
    name: Transport
    description: MQTT transport type.
  mqtt_client_id:
    name: MQTT client ID
    description: Optional MQTT client identifier.
  use_tls:
    name: Use TLS
    description: Enable TLS for the MQTT connection.
  insecure:
    name: Insecure TLS
    description: Disable TLS certificate verification.
  picture_format:
    name: Picture format
    description: Format used for picture topics.
  republish_on_update:
    name: Republish on update
    description: Republish all values on each update, not only changed ones.
  retain_on_disconnect:
    name: Retain on disconnect
    description: Keep the last MQTT values on disconnect.
  with_full_json:
    name: Full JSON topic
    description: Publish the full payload as an additional JSON topic.
  convert_times:
    name: Convert times
    description: Convert timestamps to the Home Assistant timezone.
  enable_homeassistant_discovery:
    name: Home Assistant discovery
    description: Enable the Home Assistant compatibility plugin.
  log_level:
    name: Log level
    description: Global CarConnectivity log level.
  api_log_level:
    name: API log level
    description: Connector-specific API log level.
  max_age:
    name: Cache age
    description: Maximum cache age in seconds for connector requests.
  locale:
    name: Locale
    description: Locale passed to CarConnectivity, for example de_DE.UTF-8.
  hide_vins:
    name: Hidden VINs
    description: Comma-separated VINs that should be ignored.
