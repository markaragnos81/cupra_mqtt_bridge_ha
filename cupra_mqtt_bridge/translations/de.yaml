configuration:
  brand:
    name: Marke
    description: Waehle, ob der Connector MyCupra oder MySeat verwenden soll.
  username:
    name: Benutzername
    description: Benutzername deines Seat- oder Cupra-Kontos.
  password:
    name: Passwort
    description: Passwort deines Seat- oder Cupra-Kontos.
  spin:
    name: S-PIN
    description: Optionale S-PIN fuer schreibende Fahrzeugfunktionen.
  mqtt_broker:
    name: MQTT-Broker
    description: Hostname oder IP-Adresse des MQTT-Brokers.
  mqtt_port:
    name: MQTT-Port
    description: Port fuer die Verbindung zum MQTT-Broker.
  mqtt_username:
    name: MQTT-Benutzername
    description: Optionaler MQTT-Benutzername.
  mqtt_password:
    name: MQTT-Passwort
    description: Optionales MQTT-Passwort.
  mqtt_prefix:
    name: MQTT-Praefix
    description: Praefix fuer alle MQTT-Topics.
  update_interval:
    name: Update-Intervall
    description: Abrufintervall in Sekunden. Upstream verlangt mindestens 300 Sekunden.
  mqtt_keepalive:
    name: MQTT-Keepalive
    description: MQTT-Keepalive in Sekunden.
  mqtt_version:
    name: MQTT-Version
    description: Verwendete MQTT-Protokollversion.
  transport:
    name: Transport
    description: Transportart fuer MQTT.
  mqtt_client_id:
    name: MQTT-Client-ID
    description: Optionale MQTT-Client-Kennung.
  use_tls:
    name: TLS verwenden
    description: TLS fuer die MQTT-Verbindung aktivieren.
  insecure:
    name: Unsicheres TLS
    description: TLS-Zertifikatspruefung deaktivieren.
  picture_format:
    name: Bildformat
    description: Format fuer Bild-Topics.
  republish_on_update:
    name: Bei Update alles neu senden
    description: Alle Werte bei jedem Update erneut publizieren.
  retain_on_disconnect:
    name: Werte bei Disconnect behalten
    description: Letzte MQTT-Werte beim Trennen beibehalten.
  with_full_json:
    name: Full-JSON-Topic
    description: Das komplette JSON zusaetzlich publizieren.
  convert_times:
    name: Zeiten umrechnen
    description: Zeitstempel in die Home-Assistant-Zeitzone umrechnen.
  enable_homeassistant_discovery:
    name: Home-Assistant-Discovery
    description: Das Home-Assistant-Kompatibilitaets-Plugin aktivieren.
  log_level:
    name: Log-Level
    description: Globales Log-Level fuer CarConnectivity.
  api_log_level:
    name: API-Log-Level
    description: Connector-spezifisches API-Log-Level.
  max_age:
    name: Cache-Alter
    description: Maximales Cache-Alter in Sekunden fuer Connector-Anfragen.
  locale:
    name: Locale
    description: Locale fuer CarConnectivity, zum Beispiel de_DE.UTF-8.
  hide_vins:
    name: Versteckte VINs
    description: Kommagetrennte VIN-Liste, die ignoriert werden soll.
