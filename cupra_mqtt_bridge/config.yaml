name: "Cupra MQTT Bridge"
version: "0.2.1"
slug: "cupra_mqtt_bridge"
description: "Runs CarConnectivity for Seat/Cupra inside Home Assistant and publishes vehicle data to MQTT."
url: "https://github.com/tillsteinbach/CarConnectivity-plugin-mqtt"
startup: "services"
boot: "auto"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  brand: "cupra"
  username: ""
  password: ""
  spin: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_prefix: "carconnectivity/0"
  update_interval: 300
  mqtt_keepalive: 60
  mqtt_version: "3.1.1"
  transport: "tcp"
  mqtt_client_id: ""
  use_tls: false
  insecure: false
  picture_format: "png"
  republish_on_update: false
  retain_on_disconnect: true
  with_full_json: true
  convert_times: true
  enable_homeassistant_discovery: true
  log_level: "error"
  api_log_level: "error"
  max_age: 300
  locale: ""
  hide_vins: ""
schema:
  brand: list(cupra|seat)
  username: str
  password: password
  spin: password?
  mqtt_broker: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_prefix: str
  update_interval: int(300,3500)
  mqtt_keepalive: int(15,3600)
  mqtt_version: list(3.1|3.1.1|5)
  transport: list(tcp|websockets)
  mqtt_client_id: str?
  use_tls: bool
  insecure: bool
  picture_format: list(txt|png)
  republish_on_update: bool
  retain_on_disconnect: bool
  with_full_json: bool
  convert_times: bool
  enable_homeassistant_discovery: bool
  log_level: list(debug|info|warning|error|critical)
  api_log_level: list(debug|info|warning|error|critical)
  max_age: int(0,86400)
  locale: str?
  hide_vins: str?
