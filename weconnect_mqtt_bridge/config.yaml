name: "WeConnect MQTT Bridge"
version: "0.1.0"
slug: "weconnect_mqtt_bridge"
description: "Runs WeConnect-mqtt inside Home Assistant and publishes vehicle data to MQTT."
url: "https://github.com/tillsteinbach/WeConnect-mqtt"
startup: "services"
boot: "auto"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  username: ""
  password: ""
  spin: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_prefix: "weconnect/0"
  update_interval: 300
  mqtt_keepalive: 60
  mqtt_version: "3.1.1"
  transport: "tcp"
  use_tls: false
  insecure: false
  pictures: false
  picture_format: "txt"
  no_capabilities: false
  update_on_connect: true
  republish_on_update: false
  with_raw_json_topic: true
  list_topics: false
  convert_times: true
  locale: ""
  additional_arguments: ""
schema:
  username: str
  password: password
  spin: password?
  mqtt_broker: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_prefix: str
  update_interval: int(300,3500)
  mqtt_keepalive: int(15,3600)
  mqtt_version: list(3.1|3.1.1|5)
  transport: list(tcp|websockets)
  use_tls: bool
  insecure: bool
  pictures: bool
  picture_format: list(txt|png)
  no_capabilities: bool
  update_on_connect: bool
  republish_on_update: bool
  with_raw_json_topic: bool
  list_topics: bool
  convert_times: bool
  locale: str?
  additional_arguments: str?
