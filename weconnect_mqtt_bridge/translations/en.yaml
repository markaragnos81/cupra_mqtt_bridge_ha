configuration:
  username:
    name: Username
    description: Volkswagen or Cupra account username.
  password:
    name: Password
    description: Volkswagen or Cupra account password.
  spin:
    name: S-PIN
    description: Optional S-PIN for writable vehicle actions.
  mqtt_broker:
    name: MQTT broker
    description: Hostname or IP address of the MQTT broker.
  mqtt_port:
    name: MQTT port
    description: Port used to connect to the MQTT broker.
  mqtt_username:
    name: MQTT username
    description: Optional MQTT username.
  mqtt_password:
    name: MQTT password
    description: Optional MQTT password.
  mqtt_prefix:
    name: MQTT prefix
    description: Prefix used for all MQTT topics.
  update_interval:
    name: Update interval
    description: Poll interval in seconds. Upstream requires at least 300 seconds.
  mqtt_keepalive:
    name: MQTT keepalive
    description: MQTT keepalive in seconds.
  mqtt_version:
    name: MQTT version
    description: MQTT protocol version.
  transport:
    name: Transport
    description: MQTT transport type.
  use_tls:
    name: Use TLS
    description: Enable TLS for the MQTT connection.
  insecure:
    name: Insecure TLS
    description: Disable TLS certificate verification.
  pictures:
    name: Pictures
    description: Publish vehicle pictures.
  picture_format:
    name: Picture format
    description: Format used for picture topics.
  no_capabilities:
    name: Disable capabilities
    description: Do not publish capability data.
  update_on_connect:
    name: Update on connect
    description: Trigger an update right after MQTT connect.
  republish_on_update:
    name: Republish on update
    description: Republish all values on each update, not only changed ones.
  with_raw_json_topic:
    name: Raw JSON topic
    description: Publish the raw JSON payload as an additional topic.
  list_topics:
    name: List topics
    description: Log newly created topics.
  convert_times:
    name: Convert times
    description: Convert timestamps to the Home Assistant timezone.
  locale:
    name: Locale
    description: Locale passed to weconnect-mqtt, for example de_DE.UTF-8.
  additional_arguments:
    name: Additional arguments
    description: Extra CLI arguments passed to weconnect-mqtt.
