configuration:
  username:
    name: Benutzername
    description: Benutzername deines Volkswagen- oder Cupra-Kontos.
  password:
    name: Passwort
    description: Passwort deines Volkswagen- oder Cupra-Kontos.
  spin:
    name: S-PIN
    description: Optionale S-PIN fuer schreibende Fahrzeugfunktionen.
  mqtt_broker:
    name: MQTT-Broker
    description: Hostname oder IP-Adresse des MQTT-Brokers.
  mqtt_port:
    name: MQTT-Port
    description: Port fuer die Verbindung zum MQTT-Broker.
  mqtt_username:
    name: MQTT-Benutzername
    description: Optionaler MQTT-Benutzername.
  mqtt_password:
    name: MQTT-Passwort
    description: Optionales MQTT-Passwort.
  mqtt_prefix:
    name: MQTT-Praefix
    description: Praefix fuer alle MQTT-Topics.
  update_interval:
    name: Update-Intervall
    description: Abrufintervall in Sekunden. Upstream verlangt mindestens 300 Sekunden.
  mqtt_keepalive:
    name: MQTT-Keepalive
    description: MQTT-Keepalive in Sekunden.
  mqtt_version:
    name: MQTT-Version
    description: Verwendete MQTT-Protokollversion.
  transport:
    name: Transport
    description: Transportart fuer MQTT.
  use_tls:
    name: TLS verwenden
    description: TLS fuer die MQTT-Verbindung aktivieren.
  insecure:
    name: Unsicheres TLS
    description: TLS-Zertifikatspruefung deaktivieren.
  pictures:
    name: Bilder
    description: Fahrzeugbilder mit publizieren.
  picture_format:
    name: Bildformat
    description: Format fuer Bild-Topics.
  no_capabilities:
    name: Capabilities deaktivieren
    description: Keine Capability-Daten publizieren.
  update_on_connect:
    name: Beim Verbinden aktualisieren
    description: Direkt nach MQTT-Verbindung ein Update ausloesen.
  republish_on_update:
    name: Bei Update alles neu senden
    description: Alle Werte bei jedem Update erneut publizieren.
  with_raw_json_topic:
    name: Raw-JSON-Topic
    description: Das rohe JSON als zusaetzliches Topic publizieren.
  list_topics:
    name: Topics protokollieren
    description: Neu angelegte Topics im Log ausgeben.
  convert_times:
    name: Zeiten umrechnen
    description: Zeitstempel in die Home-Assistant-Zeitzone umrechnen.
  locale:
    name: Locale
    description: Locale fuer weconnect-mqtt, zum Beispiel de_DE.UTF-8.
  additional_arguments:
    name: Zusaetzliche Argumente
    description: Extra-CLI-Parameter fuer weconnect-mqtt.
